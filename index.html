                script.type = 'module';
                script.src = url;

                    document.body.innerHTML = '<div style="color:red;font-family:monospace;padding:20px;"><h2>Module Load Error</h2><p>Check browser console (Cmd+Opt+J) for details.</p></div>';

                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                    className="w-full pl-9 pr-3 py-2 border border-black/20 rounded-lg text-sm font-sans focus:outline-none focus:ring-2 focus:ring-galen-red/30 bg-transparent"
                                />
                                {searchQuery && (
                                    <button onClick={() => setSearchQuery('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-black/30 hover:text-black">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                    </button>
                                )}
                            </div>
                            {/* F6: Print button */}
                            <button
                                onClick={() => printStep(SCRIPT[currentStepIndex], sectionLabel)}
                                title="Print / Save as PDF"
                                className="p-2 rounded-lg border border-black/20 text-black/40 hover:text-galen-red hover:border-galen-red/40 transition-all no-print"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                            </button>
                            {/* F1: Greek/English toggle (Analysis only) */}
                            {activeSection === 'analysis' && (
                                <button
                                    onClick={toggleGreek}
                                    title={greekVisible ? 'Hide Greek text' : 'Show Greek text'}
                                    className={`px-3 py-2 rounded-lg border text-xs font-sans font-bold transition-all no-print ${greekVisible ? 'bg-galen-red text-white border-galen-red' : 'border-black/20 text-black/40 hover:border-galen-red/40 hover:text-galen-red'}`}
                                >
                                    Ελ
                                </button>
                            )}
                        </div>

                        {/* F5: search result summary */}
                        {searchQuery.trim() && (
                            <div className="mb-4 text-sm font-sans text-black/50">
                                {matchingIndices.length} step{matchingIndices.length !== 1 ? 's' : ''} match "{searchQuery}"
                                {matchingIndices.length > 0 && (
                                    <span className="ml-2">
                                        {matchingIndices.map(i => (
                                            <button key={i} onClick={() => { setSearchQuery(''); setStep(i); }} className="mx-1 underline text-galen-red hover:text-[#8b0000]">
                                                Step {i + 1}
                                            </button>
                                        ))}
                                    </span>
                                )}
                            </div>
                        )}

                        {SCRIPT.map((step, index) => {
                            const annotationKey = `${activeSection}_${step.id}`;
                            const ann = annotations[annotationKey] || '';
                            const isActive = index === currentStepIndex;
                            return (
                                <div
                                    key={step.id}
                                    ref={el => stepRefs.current[index] = el}
                                    className={`flex flex-col shrink-0 transition-all duration-500 cursor-pointer ${activeSection === 'analysis'
                                        ? 'min-h-0 py-12 justify-start'
                                        : 'min-h-[60vh] justify-center'
                                        } ${isActive
                                            ? 'opacity-100 pl-4 border-l-4 border-galen-red'
                                            : 'opacity-40 border-l-4 border-transparent hover:opacity-65'
                                        }`}
                                    onClick={() => setStep(index)}
                                >
                                    <h2 className="text-2xl font-bold mb-4 font-serif text-galen-red">{step.title}</h2>

                                    {/* F1: Greek/English toggle — B1: fix quote rendering */}
                                    {activeSection === 'analysis' && step.greek && greekVisible && (
                                        <div className="mb-6 p-4 bg-parchment/50 border border-ink/10 rounded font-serif text-base leading-relaxed text-black/80">
                                            <div className="flex items-center justify-between mb-2">
                                                <span className="text-xs font-sans uppercase tracking-wider text-black/40">Greek Text</span>
                                            </div>
                                            <span className="text-lg italic">"{step.greek}"</span>
                                        </div>
                                    )}

                                    <p className={`leading-relaxed font-serif text-justify ${activeSection === 'analysis' ? 'text-lg' : 'text-xl'}`}>
                                        {renderContent(step.content)}
                                    </p>

                                    {step.reference && (
                                        <div className="mt-4 pt-4 border-t border-black/10 text-xs font-serif text-black/50 italic text-right">
                                            {step.reference}
                                        </div>
                                    )}

                                    {/* F3: Annotation field (shown only for active step) */}
                                    {isActive && (
                                        <div className="mt-6 no-print" onClick={e => e.stopPropagation()}>
                                            <label className="block text-xs font-sans uppercase tracking-wider text-black/40 mb-2">
                                                <svg className="w-3 h-3 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                                Your Notes (saved automatically)
                                            </label>
                                            <textarea
                                                value={ann}
                                                onChange={e => setAnnotation(annotationKey, e.target.value)}
                                                placeholder="Add your notes for this step…"
                                                rows={3}
                                                className="w-full px-3 py-2 border border-black/20 rounded-lg text-sm font-sans resize-none focus:outline-none focus:ring-2 focus:ring-galen-red/30 bg-transparent"
                                            />
                                        </div>
                                    )}
                                </div>
                            );
                        })}

                        {/* Styled end-of-sequence card (replaces plain "End of Sequence" text) */}
                        <div className="py-16 flex flex-col items-center gap-4 text-center">
                            <div className="w-12 h-px bg-galen-red/30 mx-auto"></div>
                            <p className="font-serif italic text-black/40 text-lg">End of {sectionLabel}</p>
                            <button
                                onClick={() => {
                                    const sections = ['larynx', 'pneuma', 'analysis'];
                                    const idx = sections.indexOf(activeSection);
                                    const next = sections[(idx + 1) % sections.length];
                                    setActiveSection(next);
                                }}
                                className="mt-2 px-5 py-2 bg-galen-red/10 text-galen-red border border-galen-red/30 rounded-lg text-sm font-sans hover:bg-galen-red hover:text-white transition-all duration-200"
                            >
                                Continue to next section →
                            </button>
                        </div>
                    </div>

                    {/* Fixed bottom bar: progress dots (F4) + prev/next */}
                    <div className="absolute bottom-0 left-0 w-full bg-white/90 backdrop-blur border-t border-black/10 px-4 py-3 z-20 no-print">
                        {/* F4: Progress dots */}
                        <div className="flex items-center justify-center gap-1.5 mb-2 flex-wrap">
                            {SCRIPT.map((_, i) => (
                                <button
                                    key={i}
                                    onClick={() => setStep(i)}
                                    title={`Step ${i + 1}: ${SCRIPT[i].title}`}
                                    className={`rounded-full transition-all duration-300 ${i === currentStepIndex
                                        ? 'w-4 h-2 bg-galen-red'
                                        : i < currentStepIndex
                                            ? 'w-2 h-2 bg-galen-red/40'
                                            : 'w-2 h-2 bg-black/15 hover:bg-galen-red/30'
                                        }`}
                                />
                            ))}
                        </div>

                        {/* Prev / counter / Next */}
                        <div className="flex items-center justify-between">
                            <button
                                disabled={currentStepIndex === 0}
                                onClick={() => setStep(Math.max(0, currentStepIndex - 1))}
                                className="px-4 py-1.5 rounded border border-black/20 hover:bg-black/5 disabled:opacity-30 disabled:cursor-not-allowed font-serif text-sm flex items-center gap-2"
                            >
                                ← Previous
                            </button>

                            <div className="text-xs font-sans text-black/50">
                                {currentStepIndex + 1} / {SCRIPT.length}
                            </div>

                            <button
                                disabled={currentStepIndex === SCRIPT.length - 1}
                                onClick={() => setStep(Math.min(SCRIPT.length - 1, currentStepIndex + 1))}
                                className="px-4 py-1.5 rounded bg-galen-red text-white hover:bg-[#8b0000] disabled:opacity-50 disabled:bg-gray-400 disabled:cursor-not-allowed font-serif text-sm flex items-center gap-2 shadow-sm transition-all"
                            >
                                Next →
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const { glossaryOpen } = useAppStore();
            return (
                <div className="flex flex-col md:flex-row h-screen w-full font-serif overflow-hidden">
                    <UrlSync />
                    <GlossaryCard />
                    {/* Hidden print target */}
                    <div id="print-target" />
                    <Navigation />
                    {/* Media panel (hidden when glossary is open on mobile) */}
                    <div className={`${glossaryOpen ? 'hidden md:flex' : ''} w-full md:w-3/5 h-[50vh] md:h-full bg-parchment relative shadow-inner order-1 md:order-2`}>
                        <MediaViewer />
                    </div>
                    {/* Text/Glossary panel */}
                    <div className="w-full md:w-2/5 h-[50vh] md:h-full bg-white z-10 shadow-2xl relative order-2 md:order-1 flex flex-col">
                        {glossaryOpen ? <GlossaryBrowser /> : <NarrativePanel />}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
